<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.P</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 500px; height: 95vh; background: #1e1e1e; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; position: relative; }
        header { padding: 15px; background: #2d2d2d; text-align: center; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.2rem; color: #007bff; flex: 1; }
        .config-btn { cursor: pointer; background: none; border: none; font-size: 20px; color: #888; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; }
        .ai { align-self: flex-start; background: #333; }
        .input-area { padding: 15px; display: flex; gap: 8px; background: #2d2d2d; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #3d3d3d; color: white; outline: none; }
        button#send-btn { padding: 10px 18px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        
        /* Modal de Configuração */
        #config-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        #config-modal input { width: 90%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div style="width: 30px;"></div>
            <h1>L.P</h1>
            <button class="config-btn" onclick="toggleConfig()">⚙️</button>
        </header>
        
        <div id="config-modal">
            <h3>Configuração</h3>
            <p style="font-size: 12px; color: #aaa;">Insira sua Groq API Key:</p>
            <input type="password" id="api-key-input" placeholder="gsk_...">
            <button onclick="saveKey()" style="background: #28a745; border: none; padding: 10px; color: white; border-radius: 5px; cursor: pointer;">Salvar Chave</button>
            <button onclick="toggleConfig()" style="background: none; border: none; color: #ff4d4d; margin-top: 15px; cursor: pointer;">Fechar</button>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message ai">Olá! Clique na engrenagem ⚙️ para configurar sua chave e comece a conversar comigo.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const configModal = document.getElementById('config-modal');

        // Carrega a chave salva ao abrir
        if(localStorage.getItem('groq_key')) {
            apiKeyInput.value = localStorage.getItem('groq_key');
        }

        function toggleConfig() {
            configModal.style.display = configModal.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveKey() {
            localStorage.setItem('groq_key', apiKeyInput.value.trim());
            alert("Chave salva localmente!");
            toggleConfig();
        }

        async function getGroqResponse(userMessage) {
            const key = localStorage.getItem('groq_key');
            if(!key) return "Por favor, configure sua API Key na engrenagem acima.";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Seu nome é L.P. Responda de forma curta e direta." },
                            { role: "user", content: userMessage }
                        ]
                    })
                });

                const data = await response.json();
                if(data.error) return "Erro da API: " + data.error.message;
                return data.choices[0].message.content;
            } catch (error) {
                return "Erro de conexão: Verifique se sua chave está correta ou se há internet.";
            }
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            userInput.value = '';

            const aiResponse = await getGroqResponse(message);
            appendMessage(aiResponse, 'ai');
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
