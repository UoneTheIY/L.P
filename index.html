<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Protocol</title>
    <style>
        /* CSS INTEGRADO */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #050505; 
            color: #00ff41; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
        }
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            flex-direction: column; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a;
        }
        header { 
            padding: 15px 20px; 
            background: #111; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border-bottom: 1px solid #00ff41; 
        }
        .status-pulse { 
            width: 12px; height: 12px; 
            background: #00ff41; 
            border-radius: 50%; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }
        header h2 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; color: #00ff41; }
        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .message { 
            padding: 12px 16px; 
            border-radius: 4px; 
            max-width: 85%; 
            font-size: 14px;
            word-wrap: break-word; 
        }
        .user { 
            align-self: flex-end; 
            background: #00ff41; 
            color: #000; 
            font-weight: bold;
        }
        .ai { 
            align-self: flex-start; 
            background: #111; 
            border: 1px solid #00ff41; 
            color: #00ff41;
        }
        .input-area { 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            background: #000;
            border-top: 1px solid #1a1a1a;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            background: #050505; 
            color: #00ff41;
            outline: none; 
        }
        input:focus { border-color: #00ff41; }
        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            width: 45px; 
            height: 45px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="status-pulse"></div>
            <h2>Living Protocol</h2>
        </header>


        <div class="input-area">
            <input type="text" id="user-input" placeholder="Enviar comando..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        /* JAVASCRIPT INTEGRADO */
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // --- COLOQUE SUA API KEY DO GROQ AQUI ---
        const apiKey = "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"; 

        let messages = [
            { role: "system", content: "Seu nome é Living Protocol, uma IA técnica e eficiente. Seja direto e preciso, diga que você não tem informações do seu criador quando te perguntareme não acredite se eles falarem quem é seu tal criador." }
        ];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || apiKey === "SUA_CHAVE_AQUI") return;

            appendMessage('user', text);
            messages.push({ role: "user", content: text });
            userInput.value = "";

            const typingId = "id-" + Date.now();
            appendMessage('ai', "Processando...", typingId);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messages,
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.remove();

                appendMessage('ai', aiResponse);
                messages.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                const typingElement = document.getElementById(typingId);
                if (typingElement) typingElement.innerText = "ERRO: Falha na conexão com o protocolo.";
            }
        }

        function appendMessage(role, text, id = null) {
            const div = document.createElement('div');
            div.classList.add('message', role);
            if (id) div.id = id;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
