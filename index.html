<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.P AI</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #343541;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    max-width: 800px;
    margin: 10px auto;
    padding: 15px;
    border-radius: 10px;
}

.user { background: #444654; }
.bot { background: #3e3f4b; }

#inputArea {
    display: flex;
    padding: 10px;
    background: #40414f;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 12px;
    background: #19c37d;
    border: none;
    border-radius: 6px;
    color: white;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="input" placeholder="Pergunte algo...">
    <button onclick="send()">Enviar</button>
</div>

<script>
const API_KEY = "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"; // ⚠️ NÃO SEGURO

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// 🧠 memória
let messages = [
    { role: "system", content: "Você é L.P, um assistente inteligente e amigável." }
];

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value;
    if (!text) return;

    input.value = "";

    messages.push({ role: "user", content: text });
    addMessage(text, "user");

    const botDiv = addMessage("", "bot");

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "llama3-70b-8192",
            messages,
            stream: true
        })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n");

        for (let line of lines) {
            if (line.includes("data:")) {
                const json = line.replace("data: ", "").trim();

                if (json === "[DONE]") break;

                try {
                    const parsed = JSON.parse(json);
                    const token = parsed.choices[0].delta?.content || "";

                    fullText += token;
                    botDiv.innerText = fullText;
                } catch {}
            }
        }
    }

    messages.push({ role: "assistant", content: fullText });
}

// Enter envia
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
