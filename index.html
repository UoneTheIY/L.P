<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.P AI</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui;
    background: #343541;
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 800px;
    margin: auto;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    max-width: 85%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 10px;
    white-space: pre-wrap;
}

.user {
    background: #444654;
    margin-left: auto;
}

.bot {
    background: #3e3f4b;
    margin-right: auto;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #40414f;
    position: sticky;
    bottom: 0;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #2f303a;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px;
    background: #19c37d;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

#chat::-webkit-scrollbar {
    width: 5px;
}
#chat::-webkit-scrollbar-thumb {
    background: #555;
}
</style>
</head>

<body>

<div class="container">
    <div id="chat"></div>

    <div id="inputArea">
        <input id="input" placeholder="Pergunte algo...">
        <button onclick="send()">Enviar</button>
    </div>
</div>

<script>
const API_KEY = "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"; // ⚠️ coloque aqui

const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = [
    { role: "system", content: "Você é L.P, um assistente inteligente." }
];

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value;
    if (!text) return;

    input.value = "";

    messages.push({ role: "user", content: text });
    addMessage(text, "user");

    const botDiv = addMessage("Pensando...", "bot");

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "llama3-70b-8192",
                messages
            })
        });

        const data = await response.json();

        if (!data.choices) {
            botDiv.innerText = "Erro: resposta inválida da API.";
            console.error(data);
            return;
        }

        const reply = data.choices[0].message.content;

        botDiv.innerText = reply;

        messages.push({ role: "assistant", content: reply });

    } catch (err) {
        botDiv.innerText = "Erro ao conectar com a IA.";
        console.error(err);
    }
}

// ENTER envia
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
