<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.P Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #334155;
    margin-right: auto;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>L.P Chatbot</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="input" placeholder="Digite sua mensagem...">
    <button onclick="sendMessage()">Enviar</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ⚠️ COLOQUE SUA API KEY AQUI (somente para testes locais)
const API_KEY = "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";

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "message " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const userText = input.value;
    if (!userText) return;

    addMessage(userText, "user");
    input.value = "";

    addMessage("Pensando...", "bot");

    try {
        const response = await fetch("http://192.168.1.15:3000/chat")", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [
                    { role: "system", content: "Você é um assistente útil chamado L.P." },
                    { role: "user", content: userText }
                ]
            })
        });

        const data = await response.json();

        // remove "Pensando..."
        chat.removeChild(chat.lastChild);

        const reply = data.choices[0].message.content;
        addMessage(reply, "bot");

    } catch (error) {
        chat.removeChild(chat.lastChild);
        addMessage("Erro ao conectar com a API.", "bot");
        console.error(error);
    }
}

// Enter envia mensagem
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
