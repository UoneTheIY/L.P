<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.P AI</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui;
    background: #343541;
    color: white;
    
    /* CENTRALIZA TUDO */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER PRINCIPAL */
.container {
    width: 100%;
    max-width: 800px;
    height: 95vh;

    display: flex;
    flex-direction: column;
    
    background: #2f303a;
    border-radius: 12px;
    overflow: hidden;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MENSAGENS */
.msg {
    max-width: 90%;
    margin: 10px 0;
    padding: 14px;
    border-radius: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
}

.user {
    background: #444654;
    margin-left: auto;
}

.bot {
    background: #3e3f4b;
    margin-right: auto;
}

/* INPUT */
#inputArea {
    display: flex;
    padding: 10px;
    background: #40414f;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #2f303a;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px 16px;
    background: #19c37d;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

/* SCROLL BONITO */
#chat::-webkit-scrollbar {
    width: 6px;
}
#chat::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div id="chat"></div>

    <div id="inputArea">
        <input id="input" placeholder="Pergunte algo...">
        <button onclick="send()">Enviar</button>
    </div>

</div>

<script>
const API_KEY = "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"; // ⚠️ NÃO SEGURO

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// 🧠 memória
let messages = [
    { role: "system", content: "Você é L.P, um assistente inteligente e amigável." }
];

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const text = input.value;
    if (!text) return;

    input.value = "";

    messages.push({ role: "user", content: text });
    addMessage(text, "user");

    const botDiv = addMessage("", "bot");

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "llama3-70b-8192",
                messages,
                stream: true
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");

            for (let line of lines) {
                if (line.includes("data:")) {
                    const json = line.replace("data: ", "").trim();

                    if (json === "[DONE]") break;

                    try {
                        const parsed = JSON.parse(json);
                        const token = parsed.choices[0].delta?.content || "";

                        fullText += token;
                        botDiv.innerText = fullText;
                    } catch {}
                }
            }
        }

        messages.push({ role: "assistant", content: fullText });

    } catch (err) {
        botDiv.innerText = "Erro ao conectar com a IA.";
    }
}

// ENTER envia
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
