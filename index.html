<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.P - Assistente Inteligente</title>
    <style>
        /* CSS Integrado */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        header {
            padding: 15px;
            background: #2d2d2d;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #007bff;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: #007bff;
            border-bottom-right-radius: 2px;
        }

        .ai {
            align-self: flex-start;
            background: #333;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 8px;
            background: #2d2d2d;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #3d3d3d;
            color: white;
            outline: none;
        }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <h1>L.P</h1>
        </header>
        
        <div id="chat-box" class="chat-box">
            <div class="message ai">Olá! Eu sou o L.P. Como posso ajudar você hoje?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        // JavaScript Integrado
        const GROQ_API_KEY = "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"; // <--- COLOQUE SUA CHAVE AQUI

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function getGroqResponse(userMessage) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "Seu nome é L.P, uma IA inteligente, rápida e fria, seu criador é denominado de Syntetix (um grupo de pessoas)" },
                            { role: "user", content: userMessage }
                        ]
                    })
                });

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error("Erro:", error);
                return "Ops, tive um problema ao processar isso. Verifique sua conexão ou API Key.";
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            userInput.value = '';

            // Resposta temporária enquanto a IA "pensa"
            const aiResponse = await getGroqResponse(message);
            appendMessage(aiResponse, 'ai');
        }

        sendBtn.addEventListener('click', handleSend);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
